# Flux 이벤트 → Discord. 이게 Ready 되는 순간부터 모든 리컨실 변경·에러가 웹훅으로 나간다
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: notifications
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/flux-system/notifications/app
  targetNamespace: flux-system
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
