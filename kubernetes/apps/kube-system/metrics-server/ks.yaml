# kubectl top — 12GiB 단일 노드 운영에 사실상 필수, 비용 ~0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/kube-system/metrics-server/app
  targetNamespace: kube-system
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
