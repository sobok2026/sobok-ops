---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.13.1"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Talos kubelet은 self-signed 서빙 인증서 — kubelet-csr-approver 스택 없이 우회
    # 매니지드 k8s 이관 시 이 args를 제거한다 (README 이관 체크리스트)
    args:
      - --kubelet-insecure-tls
