# /api prefix — 앱이 /api prefix를 그대로 받으므로 rewrite 없음 (better-auth도 /api/auth에 마운트)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
spec:
  parentRefs:
    - name: sobok
      namespace: network
  hostnames:
    - sobok.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api
          port: 3002
