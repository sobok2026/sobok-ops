# one-shot 결제 배치 — CronJob. 실패·미실행 감시는 Grafana Cloud의 kube_job_status_failed +
# dead-man(성공 잡 부재) 알림이 담당한다
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: billing-worker
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/sobok/billing-worker/app
  targetNamespace: sobok
  prune: true
  wait: true
  dependsOn:
    - name: ghcr-pull
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
