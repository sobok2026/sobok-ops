---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: billing-worker
spec:
  image: ghcr.io/sobok2026/sobok-billing-worker
  interval: 5m
  secretRef:
    name: ghcr-pull
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: billing-worker
spec:
  imageRepositoryRef:
    name: billing-worker
  filterTags:
    pattern: '^main-(?P<ts>\d+)-'
    extract: '$ts'
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: IfNotPresent
