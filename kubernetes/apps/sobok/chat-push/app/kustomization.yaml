---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - imagepolicy.yaml
  - secret.sops.yaml
configMapGenerator:
  - name: chat-push-config
    literals:
      - NODE_ENV=production
      - PORT=3005
      # VAPID subject로 쓰이므로 https 필수
      - APP_ORIGIN=https://sobok.cc
      - VAPID_PUBLIC_KEY=<VAPID_PUBLIC_KEY>
      - KAFKA_BROKERS=<AIVEN_KAFKA_HOST>:<PORT>
      - KAFKA_CLIENT_ID=sobok-chat-push
      - APP_POSTGRES_POOL_MAX=1
      - APP_POSTGRES_APPLICATION_NAME=sobok-chat-push
