# 웹푸시 발송 워커 — 인그레스 없음
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: chat-push
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/sobok/chat-push/app
  targetNamespace: sobok
  prune: true
  wait: true
  dependsOn:
    - name: ghcr-pull
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
