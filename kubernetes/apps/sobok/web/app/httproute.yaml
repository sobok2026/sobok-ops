# catch-all — /api(api)·/ws(chat)는 더 긴 prefix라 스펙 보장으로 우선 매칭된다
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
spec:
  parentRefs:
    - name: sobok
      namespace: network
  hostnames:
    - sobok.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 3000
