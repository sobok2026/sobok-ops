---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: web
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/sobok/web/app
  targetNamespace: sobok
  prune: true
  wait: true
  dependsOn:
    # HTTPRoute의 parentRef 대상 Gateway와 pull secret이 먼저 존재해야 한다
    - name: gateway
    - name: ghcr-pull
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
