# digest 핀 자동 커밋 — 배포 이력이 전부 이 레포 커밋 로그로 남는다
# 주의: ImageUpdateAutomation은 자기 네임스페이스의 ImagePolicy만 읽으므로
# 반드시 정책들과 같은 sobok ns에 산다 (마커 "sobok:<앱>"과 3자 일치)
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: image-automation
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/sobok/image-automation/app
  targetNamespace: sobok
  prune: true
  wait: true
  dependsOn:
    - name: ghcr-pull
  sourceRef:
    kind: GitRepository
    name: flux-system
