# Envoy Gateway 컨트롤러 — 인그레스 체인의 뿌리 (envoy-gateway → gateway → cloudflared)
# wait: true라 HelmRelease Ready(CRD 등록 + 컨트롤러 기동)가 하류 dependsOn의 게이트가 된다
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: ./kubernetes/apps/network/envoy-gateway/app
  targetNamespace: network
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
