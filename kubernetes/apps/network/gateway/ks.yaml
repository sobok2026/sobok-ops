# Gateway 데이터플레인 선언 — envoy-gateway 컨트롤러가 CRD를 등록한 뒤에만 적용 가능
# kstatus는 Gateway의 Programmed 조건을 모르므로 CEL 헬스체크로 "실제로 프록시가 떴다"를 게이트한다
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/network/gateway/app
  targetNamespace: network
  prune: true
  wait: true
  healthCheckExprs:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      failed: status.conditions.filter(e, e.type == 'Programmed').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Programmed').all(e, e.status == 'True')
  dependsOn:
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
