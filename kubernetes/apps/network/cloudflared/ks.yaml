# cloudflared — 터널이 가리킬 Gateway 프록시 Service(envoy-sobok)가 먼저 존재해야 한다
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  path: ./kubernetes/apps/network/cloudflared/app
  targetNamespace: network
  prune: true
  wait: true
  dependsOn:
    - name: gateway
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
