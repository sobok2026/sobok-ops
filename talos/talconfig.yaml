# talhelper 입력 — 단일 노드 Talos 클러스터 선언
# 시크릿은 talsecret.sops.yaml(just talos-secret)과 talenv.sops.yaml(TAILSCALE_AUTHKEY)에서 온다
# UTM Shared Network(192.168.64.0/24, 게이트웨이 192.168.64.1) 기준 정적 IP
---
clusterName: sobok-prod
endpoint: https://192.168.64.10:6443
talosVersion: ${talosVersion}
kubernetesVersion: ${kubernetesVersion}

# 단일 노드: 컨트롤플레인이 워크로드를 겸한다
allowSchedulingOnControlPlanes: true

# tailscale 조인 뒤 MagicDNS 이름을 추가하고 재적용하면 tailnet 경유 kubectl이 열린다
additionalApiServerCertSans:
  - 192.168.64.10
  # - sobok-1.<tailnet>.ts.net

nodes:
  - hostname: sobok-1
    controlPlane: true
    ipAddress: 192.168.64.10
    # UTM vz 기본 드라이브는 VirtIO block = /dev/vda
    # maintenance mode에서 `talosctl -n <ip> get disks --insecure`로 실측 확인 후 확정한다
    installDisk: /dev/vda
    # genurl image가 참조한다 — 없으면 amd64 ISO URL이 나와 vz VM이 부팅 불가
    machineSpec:
      mode: metal
      arch: arm64
    # tailscale 조인 뒤 MagicDNS 이름을 추가하고 재적용하면 tailnet 경유 talosctl이 열린다
    certSANs:
      - 192.168.64.10
      # - sobok-1.<tailnet>.ts.net
    schematic:
      customization:
        # vz 시리얼(PTTY)로 Talos 대시보드를 보려면 hvc0 콘솔이 필요하다
        extraKernelArgs:
          - console=hvc0
        systemExtensions:
          officialExtensions:
            - siderolabs/tailscale
    extensionServices:
      - name: tailscale
        environment:
          - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
          - TS_HOSTNAME=sobok-1
          # 이미 로그인된 상태면 재로그인을 건너뛴다 (키 만료 시 서비스 재시작 실패 방지)
          - TS_AUTH_ONCE=true
          # 노드 DNS는 그대로 두고 tailnet DNS를 받지 않는다 (CoreDNS 충돌 방지)
          - TS_ACCEPT_DNS=false
          # OAuth 클라이언트 시크릿을 authkey로 쓸 때 태그 지정이 필수다
          - TS_EXTRA_ARGS=--advertise-tags=tag:sobok

patches:
  - "@./patches/network.yaml"
